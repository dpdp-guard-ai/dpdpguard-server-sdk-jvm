name: CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      # build.gradle.kts's downloadOpenApiSpec task fetches openapi/v1.yaml
      # from @dpdpguard/contract's published npm package via unpkg.com (no
      # Maven mirror exists yet — ADR-002 D2), then org.openapi.generator
      # regenerates the Kotlin client from it.
      #
      # Required gate (ADR-002 D5): AuditHashTest runs @dpdpguard/contract's
      # golden vectors; a failure means this SDK's AuditHash has drifted
      # from convex/lib/auditHash.ts. ApiErrorCodeTest is the same drift
      # guard for the ADR-002 error catalog.
      - run: ./gradlew build --no-daemon
